<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ==============================
       PANTALLA DE AUTH (login/registro)
       ============================== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">📚</span>
        <h1 class="logo-text">Cursada</h1>
        <p class="logo-sub">Tu organizador universitario</p>
      </div>

      <!-- Tabs login / registro -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Registrarse</button>
      </div>

      <!-- Login -->
      <div class="auth-form active" id="form-login">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary btn-full" id="btn-login">Entrar</button>
        <p class="auth-error" id="login-error"></p>
      </div>

      <!-- Registro -->
      <div class="auth-form" id="form-register">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="reg-nombre" placeholder="¿Cómo te llamás?" />
        </div>
        <div class="field">
          <label>Carrera</label>
          <input type="text" id="reg-carrera" placeholder="Ej: Ing. en Sistemas" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="tu@email.com" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" />
        </div>
        <button class="btn-primary btn-full" id="btn-register">Crear cuenta</button>
        <p class="auth-error" id="register-error"></p>
      </div>
    </div>
  </div>

  <!-- ==============================
       APP PRINCIPAL (visible post-login)
       ============================== -->
  <div id="app" class="app hidden">

    <!-- Overlay para cerrar sidebar en mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span>📚</span>
          <span class="sidebar-logo-text">Cursada</span>
        </div>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>

      <!-- Perfil del usuario -->
      <div class="sidebar-profile">
        <div class="profile-avatar" id="sidebar-avatar">?</div>
        <div class="profile-info">
          <p class="profile-name" id="sidebar-name">...</p>
          <p class="profile-carrera" id="sidebar-carrera">...</p>
        </div>
      </div>

      <!-- Navegación -->
      <nav class="sidebar-nav">
        <a class="nav-item active" data-section="dashboard">
          <span class="nav-icon">🏠</span>
          <span>Inicio</span>
        </a>
        <a class="nav-item" data-section="materias">
          <span class="nav-icon">📖</span>
          <span>Materias</span>
        </a>
        <a class="nav-item" data-section="examenes">
          <span class="nav-icon">📝</span>
          <span>Exámenes</span>
        </a>
        <a class="nav-item" data-section="evaluaciones">
          <span class="nav-icon">⭐</span>
          <span>Evaluaciones</span>
        </a>
        <a class="nav-item" data-section="calendario">
          <span class="nav-icon">📅</span>
          <span>Calendario</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <span>↩</span> Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

      <!-- Header con hamburger -->
      <header class="top-bar">
        <button class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <h2 class="page-title" id="page-title">Inicio</h2>
        <div class="top-bar-right">
          <!-- espacio para acciones contextuales -->
        </div>
      </header>

      <!-- Secciones -->
      <div class="sections-wrapper">

        <!-- DASHBOARD -->
        <section class="section active" id="section-dashboard">
          <div id="dashboard-content">
            <!-- renderizado por dashboard.js -->
          </div>
        </section>

        <!-- MATERIAS -->
        <section class="section" id="section-materias">
          <div class="section-header">
            <h3>Mis materias</h3>
            <button class="btn-primary btn-sm" id="btn-nueva-materia">+ Nueva materia</button>
          </div>
          <div id="materias-list">
            <!-- renderizado por materias.js -->
          </div>
        </section>

        <!-- EXAMENES -->
        <section class="section" id="section-examenes">
          <div class="section-header">
            <h3>Exámenes</h3>
            <button class="btn-primary btn-sm" id="btn-nuevo-examen">+ Nuevo examen</button>
          </div>
          <div id="examenes-list">
            <!-- renderizado por examenes.js -->
          </div>
        </section>

        <!-- EVALUACIONES -->
        <section class="section" id="section-evaluaciones">
          <div class="section-header">
            <h3>Evaluaciones</h3>
            <button class="btn-primary btn-sm" id="btn-nueva-evaluacion">+ Agregar nota</button>
          </div>
          <div id="evaluaciones-list">
            <!-- renderizado por evaluaciones.js -->
          </div>
        </section>

        <!-- CALENDARIO -->
        <section class="section" id="section-calendario">
          <div id="calendario-content">
            <!-- renderizado por dashboard.js -->
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- ==============================
       MODALES (se activan por JS)
       ============================== -->
  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- contenido dinámico -->
      </div>
    </div>
  </div>

  <!-- Toast de notificaciones -->
  <div class="toast hidden" id="toast"></div>

  <!-- Scripts: config primero, luego módulos, luego app -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/materias.js"></script>
  <script src="js/examenes.js"></script>
  <script src="js/evaluaciones.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
