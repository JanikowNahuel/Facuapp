<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ==============================
       PANTALLA DE AUTH
       ============================== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">📚</span>
        <h1 class="logo-text">Cursada</h1>
        <p class="logo-sub">Tu organizador universitario</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Registrarse</button>
      </div>

      <div class="auth-form active" id="form-login">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary btn-full" id="btn-login">Entrar</button>
        <p class="auth-error" id="login-error"></p>
      </div>

      <div class="auth-form" id="form-register">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="reg-nombre" placeholder="¿Cómo te llamás?" />
        </div>
        <div class="field">
          <label>Carrera</label>
          <input type="text" id="reg-carrera" placeholder="Ej: Ing. en Sistemas" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="tu@email.com" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" />
        </div>
        <button class="btn-primary btn-full" id="btn-register">Crear cuenta</button>
        <p class="auth-error" id="register-error"></p>
      </div>
    </div>
  </div>

  <!-- ==============================
       APP PRINCIPAL
       ============================== -->
  <div id="app" class="app hidden">

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

      <!-- Top bar -->
      <header class="top-bar" id="top-bar">
        <button class="btn-back hidden" id="btn-back">
          <span>←</span>
        </button>
        <h2 class="page-title" id="page-title">Inicio</h2>
        <div class="top-bar-right" id="top-bar-right"></div>
      </header>

      <!-- Secciones principales -->
      <div class="sections-wrapper">

        <!-- DASHBOARD -->
        <section class="section active" id="section-dashboard">
          <div id="dashboard-content"></div>
        </section>

        <!-- MATERIAS (lista) -->
        <section class="section" id="section-materias">
          <div id="materias-list"></div>
        </section>

        <!-- DETALLE DE MATERIA (nueva pantalla) -->
        <section class="section" id="section-materia-detalle">
          <div id="materia-detalle-content"></div>
        </section>

        <!-- CALENDARIO -->
        <section class="section" id="section-calendario">
          <div id="calendario-content"></div>
        </section>

      </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="bnav-item active" data-section="dashboard">
        <span class="bnav-icon">🏠</span>
        <span class="bnav-label">Inicio</span>
      </button>
      <button class="bnav-item" data-section="materias">
        <span class="bnav-icon">📖</span>
        <span class="bnav-label">Materias</span>
      </button>
      <button class="bnav-item" data-section="calendario">
        <span class="bnav-icon">📅</span>
        <span class="bnav-label">Calendario</span>
      </button>
      <button class="bnav-item" id="bnav-perfil" data-section="perfil">
        <span class="bnav-icon" id="bnav-avatar">?</span>
        <span class="bnav-label">Perfil</span>
      </button>
    </nav>

  </div>

  <!-- ==============================
       MODALES
       ============================== -->
  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Modal de perfil/logout -->
  <div class="modal-backdrop hidden" id="perfil-backdrop">
    <div class="modal" id="perfil-modal">
      <div class="modal-header">
        <h3>Perfil</h3>
        <button class="modal-close" onclick="cerrarPerfil()">✕</button>
      </div>
      <div class="modal-body">
        <div class="perfil-info">
          <div class="perfil-avatar" id="perfil-avatar">?</div>
          <div>
            <p class="perfil-nombre" id="perfil-nombre">...</p>
            <p class="perfil-carrera" id="perfil-carrera">...</p>
          </div>
        </div>
        <button class="btn-danger btn-full" id="btn-logout" style="margin-top:8px;">↩ Cerrar sesión</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/materias.js"></script>
  <script src="js/examenes.js"></script>
  <script src="js/evaluaciones.js"></script>
  <script src="js/recordatorios.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
